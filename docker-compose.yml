services:

  library-mysql:
    image: mysql:8.4
    container_name: mysql-api
    environment:
      MYSQL_ROOT_PASSWORD: ${LIBRARY_DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_api_data:/var/lib/mysql
      - ./mysql/init/01-library-db.sql:/docker-entrypoint-initdb.d/01-library-db.sql
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${LIBRARY_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-mysql:
    image: mysql:8.4
    container_name: mysql-microservice
    environment:
      MYSQL_ROOT_PASSWORD: ${NOTIFICATION_DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_microservice_data:/var/lib/mysql
      - ./mysql/init/02-notification-db.sql:/docker-entrypoint-initdb.d/02-notification-db.sql
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${NOTIFICATION_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - api-network

    
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - api-network

  api:
    build:
      context: ./java_api
      dockerfile: Dockerfile
    container_name: library-api
    environment:
      DB_URL: ${LIBRARY_DB_URL}
      DB_USER: ${LIBRARY_DB_USER}
      DB_PASSWORD: ${LIBRARY_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      library-mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - api-network

  microservice:
    build:
      context: ./java_microservice
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      NOTIFICATION_DB_URL: ${NOTIFICATION_DB_URL}
      NOTIFICATION_DB_USER: ${NOTIFICATION_DB_USER}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      notification-mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - api-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  mysql_api_data:
  mysql_microservice_data: